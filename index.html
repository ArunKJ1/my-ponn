<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Be My Valentine ❤️</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 30px 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      z-index: 1;
      max-width: 320px;
    }

    h1 {
      color: #ff4d6d;
      margin-bottom: 15px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin: 10px;
    }

    #yes {
      background: #ff4d6d;
      color: white;
    }

    #no {
      background: #ddd;
      position: absolute;
    }

    .message {
      color: #ff4d6d;
      font-size: 14px;
      margin-top: 10px;
      min-height: 18px;
    }

    .signature {
      margin-top: 15px;
      font-size: 14px;
      color: #ff4d6d;
      font-style: italic;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: float 4s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Will you be my Valentine? ❤️</h1>
    <button id="yes" onclick="yesClick()">Yes 💖</button>
    <button id="no">No 🙈</button>
    <div class="message" id="message"></div>
    <div class="signature">– Yours, idiot ❤️</div>
  </div>

  <div class="hearts" id="hearts"></div>

  <script>
    const noBtn = document.getElementById("no");
    const msg = document.getElementById("message");
    let noCount = 0;

    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("touchstart", moveButton);

    function moveButton() {
      noCount++;

      const x = Math.random() * (window.innerWidth - 120);
      const y = Math.random() * (window.innerHeight - 60);
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";

      if (noCount === 2) msg.innerText = "Hey… don’t run from me 😢";
      if (noCount === 4) msg.innerText = "Are you sure? I’m kinda serious ❤️";
      if (noCount === 6) msg.innerText = "My heart is right here… 🥺";
      if (noCount >= 8) {
        msg.innerText = "There was never a No option anyway 😉";
        noBtn.style.display = "none";
      }
    }

    function yesClick() {
      document.body.innerHTML = `
        <div class="card">
          <h1>Yayyy! 💕</h1>
          <p>You just made my heart officially yours 😘</p>
          <p><strong>There was never a No option anyway 😉</strong></p>
          <div class="signature">– Yours, idiot ❤️</div>
        </div>
        <div class="hearts" id="hearts"></div>
      `;
      startHearts();
    }

    function startHearts() {
      const container = document.getElementById("hearts");
      setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (2 + Math.random() * 3) + "s";
        container.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
      }, 250);
    }
  </script>

</body>
</html>
